<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repo Promoter Agent</title>
    <style>
        *{box-sizing:border-box}
        body{font-family:system-ui,sans-serif;max-width:900px;margin:2rem auto;padding:0 1rem;color:#222}
        h1{margin-bottom:.25rem}
        .desc{color:#666;margin-top:0}
        .tabs{display:flex;border-bottom:2px solid #ddd;margin-bottom:0}
        .tab{padding:.6rem 1.5rem;font-size:1rem;font-weight:600;cursor:pointer;border:none;background:none;color:#666;border-bottom:2px solid transparent;margin-bottom:-2px;transition:color .2s,border-color .2s}
        .tab:hover{color:#333}
        .tab.active{color:#0969da;border-bottom-color:#0969da}
        .tab.active.tab-search{color:#2da44e;border-bottom-color:#2da44e}
        .tab-content{display:none;border:1px solid #ddd;border-top:none;border-radius:0 0 8px 8px;padding:1.25rem}
        .tab-content.active{display:block}
        section{border:none;border-radius:0;padding:0;margin-bottom:0}
        section h2{display:none}
        .gen-section{border-left:none}
        .search-section{border-left:none}
        label{display:block;font-weight:600;margin:.6rem 0 .25rem}
        input[type=text],select{width:100%;padding:.5rem;font-size:.95rem;border:1px solid #ccc;border-radius:4px}
        .row{display:flex;gap:.75rem;flex-wrap:wrap}
        .row>*{flex:1;min-width:180px}
        button{padding:.5rem 1rem;font-size:.95rem;cursor:pointer;border:1px solid #333;border-radius:4px;background:#1a1a1a;color:#fff}
        button:hover{background:#333}
        button:disabled{opacity:.5;cursor:not-allowed}
        .btn-sm{font-size:.75rem;padding:.25rem .5rem;background:#555;border:none}
        .btn-sm:hover{background:#777}
        .status{color:#555;font-style:italic;margin:.5rem 0}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
        .status:not(:empty){animation:pulse 1.5s ease-in-out infinite}
        .info-note{color:#0969da;font-size:.85rem;margin:.4rem 0}
        .error{color:#c00;margin:.5rem 0;white-space:pre-wrap}
        .card{background:#f8f9fa;border:1px solid #e1e4e8;border-radius:6px;padding:1rem;margin:.75rem 0}
        .card h3{margin:0 0 .4rem}
        .card p{margin:.3rem 0}
        .pills{display:flex;flex-wrap:wrap;gap:.3rem;margin:.4rem 0}
        .pill{background:#ddf4ff;color:#0969da;padding:.15rem .5rem;border-radius:12px;font-size:.8rem}
        .tweet{background:#fff;border:1px solid #ddd;border-radius:4px;padding:.5rem .75rem;margin:.3rem 0;display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem}
        .tweet span{flex:1}
        .linkedin-block{background:#fff;border:1px solid #ddd;border-radius:4px;padding:.75rem;margin:.3rem 0;white-space:pre-wrap}
        .li-copy-wrap{text-align:right;margin-top:.3rem}
        .cta{background:#fff8c5;border:1px solid #d4a72c;border-radius:4px;padding:.5rem .75rem;margin:.4rem 0;font-weight:600}
        .benefits li{margin:.2rem 0}
        .toggle{font-size:.8rem;color:#0969da;cursor:pointer;background:none;border:none;padding:0;text-decoration:underline}
        pre{background:#f4f4f4;padding:1rem;border-radius:4px;overflow-x:auto;font-size:.82rem;white-space:pre-wrap;word-wrap:break-word}
        .compact-card{cursor:pointer}
        .facet-group{margin-bottom:.5rem}
        .facet-group strong{font-size:.85rem;color:#555;margin-right:.5rem}
        .facet-chip{display:inline-block;background:#e8f0fe;color:#1a73e8;border:1px solid #c2d7f5;border-radius:12px;padding:.15rem .6rem;font-size:.8rem;cursor:pointer;margin:.15rem .2rem;transition:background .15s}
        .facet-chip:hover{background:#c2d7f5}
        .facet-chip.active{background:#1a73e8;color:#fff;border-color:#1a73e8}
        .filter-chip{display:inline-flex;align-items:center;gap:.3rem;background:#fef3c7;color:#92400e;border:1px solid #fcd34d;border-radius:12px;padding:.15rem .6rem;font-size:.8rem}
        .filter-chip button{background:none;border:none;color:#92400e;cursor:pointer;font-size:.9rem;padding:0;line-height:1}
        .filter-chip button:hover{color:#c00}
        .compact-card:hover{border-color:#0969da}
        .compact-card h3 a{color:#0969da;text-decoration:none}
        .compact-card h3 a:hover{text-decoration:underline}
        .meta{font-size:.8rem;color:#666}
        .traffic-block{background:#f0f7ff;border:1px solid #c8e1ff;border-radius:4px;padding:.5rem .75rem;margin:.5rem 0;font-size:.9rem}
        .traffic-block strong{display:block;margin-bottom:.25rem}
        .traffic-block .metric{display:inline-block;margin-right:1rem;color:#333}
        .hidden{display:none}
        .analysis-panel{background:#f0fdf4;border:1px solid #86efac;border-left:4px solid #22c55e;border-radius:6px;padding:1rem;margin:.75rem 0}
        .analysis-panel h4{margin:0 0 .25rem;font-size:1rem;color:#166534}
        .analysis-label{font-size:.75rem;color:#888;margin-bottom:.75rem;font-style:italic}
        .analysis-field{margin-bottom:.5rem}
        .analysis-field strong{display:block;font-size:.85rem;color:#333;margin-bottom:.15rem}
        .analysis-field p{margin:.2rem 0;font-size:.9rem}
        .analysis-field ul{margin:.15rem 0 0 1.2rem;padding:0;font-size:.9rem}
        .analysis-field li{margin:.15rem 0}
        .analysis-snippet{color:#166534;font-size:.85rem;margin:.2rem 0 .4rem;padding-left:.25rem;border-left:2px solid #86efac}
        .analysis-copyable{display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem;background:#fff;border:1px solid #d1fae5;border-radius:4px;padding:.4rem .6rem;margin-top:.15rem;font-size:.9rem}
        .analysis-copyable span{flex:1}
        .analysis-field strong[title]{cursor:help;border-bottom:1px dotted #999}
        mark{background:#fff3b0;color:inherit;padding:.05rem .15rem;border-radius:2px}
        .autocomplete-wrap{position:relative}
        .autocomplete-list{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #ccc;border-top:none;border-radius:0 0 6px 6px;max-height:240px;overflow-y:auto;z-index:100;display:none;box-shadow:0 4px 12px rgba(0,0,0,.1)}
        .autocomplete-list.visible{display:block}
        .autocomplete-item{padding:.5rem .75rem;cursor:pointer;font-size:.9rem;border-bottom:1px solid #f0f0f0}
        .autocomplete-item:last-child{border-bottom:none}
        .autocomplete-item:hover,.autocomplete-item.active{background:#f0f7ff;color:#0969da}
        .autocomplete-item .ac-weight{float:right;font-size:.75rem;color:#888}
        .did-you-mean{background:#fff8e1;border:1px solid #ffe082;border-radius:6px;padding:.5rem .75rem;margin:.5rem 0;font-size:.9rem;color:#6d4c00}
        .did-you-mean a{color:#0969da;font-weight:600;cursor:pointer;text-decoration:underline}
        .did-you-mean a:hover{color:#0550ae}
        .channel-tabs{display:flex;gap:0;margin:.75rem 0 .5rem;border-bottom:2px solid #e1e4e8}
        .channel-tab{padding:.35rem .75rem;font-size:.8rem;font-weight:600;cursor:pointer;border:none;background:none;color:#666;border-bottom:2px solid transparent;margin-bottom:-2px;transition:color .15s,border-color .15s}
        .channel-tab:hover{color:#333}
        .channel-tab.active{color:#0969da;border-bottom-color:#0969da}
        .channel-tab .ch-icon{margin-right:.3rem}
        .group-count{font-size:.75rem;color:#888;font-weight:400;margin-left:.5rem}
        .mlt-btn{display:inline-block;margin:.75rem 0 .25rem;padding:.35rem .75rem;font-size:.8rem;background:#f0f7ff;border:1px solid #c8e1ff;color:#0969da;border-radius:4px;cursor:pointer}
        .mlt-btn:hover{background:#dbeafe;border-color:#0969da}
        .mlt-results{margin:.5rem 0;padding:.5rem;background:#fafbfc;border:1px solid #e1e4e8;border-radius:6px}
        .mlt-results h4{margin:0 0 .5rem;font-size:.9rem;color:#555}
        .mlt-card{background:#fff;border:1px solid #e1e4e8;border-radius:4px;padding:.5rem .75rem;margin:.3rem 0;font-size:.85rem}
        .mlt-card a{color:#0969da;text-decoration:none;font-weight:600}
        .mlt-card a:hover{text-decoration:underline}
        .mlt-card .mlt-meta{color:#666;font-size:.8rem}
        .popular-section{margin:.75rem 0}
        .popular-section h4{font-size:.85rem;color:#555;margin:0 0 .4rem;font-weight:600}
        .popular-chip{display:inline-block;background:#f3e8ff;color:#7c3aed;border:1px solid #ddd6fe;border-radius:12px;padding:.2rem .6rem;font-size:.8rem;cursor:pointer;margin:.15rem .2rem;transition:background .15s}
        .popular-chip:hover{background:#ddd6fe}
        .popular-chip .pop-count{font-size:.7rem;color:#a78bfa;margin-left:.25rem}
    </style>
</head>
<body>
<h1>Repo Promoter Agent</h1>
<p class="desc">Generate promotional content for any public GitHub repo, then search your history.</p>

<!-- ===== TABS ===== -->
<div class="tabs">
    <button class="tab active" onclick="switchTab('generate')" id="tab-generate">Generate</button>
    <button class="tab tab-search" onclick="switchTab('search')" id="tab-search">Search &amp; Browse</button>
</div>

<!-- ===== GENERATE ===== -->
<div class="tab-content active" id="panel-generate">
<section class="gen-section">
    <h2>Generate</h2>
    <label for="repo-url">GitHub Repo URL</label>
    <input type="text" id="repo-url" placeholder="https://github.com/owner/repo" aria-label="GitHub repository URL">
    <div class="row">
        <div>
            <label for="channel">Target Channel</label>
            <select id="channel" aria-label="Target channel"><option value="general">General</option><option value="twitter">Twitter</option><option value="linkedin">LinkedIn</option></select>
        </div>
        <div>
            <label for="audience">Target Audience <span style="font-weight:400;color:#888">(optional)</span></label>
            <input type="text" id="audience" placeholder="e.g. frontend developers" aria-label="Target audience">
        </div>
    </div>
    <br>
    <button id="gen-btn" aria-label="Generate promotional content">Generate</button>
    <div id="gen-status" class="status"></div>
    <div id="gen-info" class="info-note"></div>
    <div id="gen-error" class="error"></div>
    <div id="gen-result" class="hidden"></div>
</section>
</div>

<!-- ===== SEARCH ===== -->
<div class="tab-content" id="panel-search">
<section class="search-section">
    <h2>Search &amp; Browse</h2>
    <div style="display:flex;gap:.5rem">
        <div class="autocomplete-wrap" style="flex:1">
            <input type="text" id="search-q" placeholder="Search promotions… (leave empty to browse recent)" aria-label="Search promotions" autocomplete="off">
            <div id="suggest-list" class="autocomplete-list" role="listbox"></div>
        </div>
        <button id="search-btn" aria-label="Search promotions">Search</button>
    </div>
    <div id="search-status" class="status"></div>
    <div id="search-error" class="error"></div>
    <div id="search-collation"></div>
    <div id="active-filters" style="display:flex;flex-wrap:wrap;gap:.3rem;margin:.5rem 0"></div>
    <div id="search-facets" style="margin:.5rem 0"></div>
    <div id="search-sort" style="margin:.5rem 0;display:flex;align-items:center;gap:.5rem">
        <label for="sort-select" style="font-size:.85rem;color:#555;font-weight:600;margin:0">Sort by:</label>
        <select id="sort-select" style="padding:.25rem .5rem;font-size:.85rem;border:1px solid #ccc;border-radius:4px" onchange="currentSort=this.value;doSearch()">
            <option value="relevance">Relevance</option>
            <option value="newest">Newest</option>
            <option value="stars">Most Stars</option>
            <option value="views">Most Views</option>
        </select>
    </div>
    <div id="popular-searches"></div>
    <div id="search-results"></div>
</section>
</div>

<script>
/* ---- tab switching ---- */
function switchTab(name){
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(p=>p.classList.remove('active'));
    document.getElementById('tab-'+name).classList.add('active');
    document.getElementById('panel-'+name).classList.add('active');
}

/* ---- helpers ---- */
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function copyText(text,btn){navigator.clipboard.writeText(text).then(()=>{btn.textContent='Copied!';setTimeout(()=>{btn.textContent='Copy'},1500)})}
function safeHref(url){try{const u=new URL(url);return(u.protocol==='https:'||u.protocol==='http:')?url:'#'}catch{return '#'}}
function tweetCopyBtn(){return '<button class="btn-sm" aria-label="Copy tweet" onclick="event.stopPropagation();copyText(this.previousElementSibling.textContent,this)">Copy</button>'}
function liCopyBtn(){return '<div class="li-copy-wrap"><button class="btn-sm" aria-label="Copy LinkedIn post" onclick="event.stopPropagation();copyText(this.parentElement.previousElementSibling.textContent,this)">Copy</button></div>'}
function fmtDate(s){if(!s)return '';const d=new Date(s.includes('T')?s:s.replace(' ','T')+'Z');return isNaN(d.getTime())?s:d.toLocaleDateString()}
function copyAnalysis(btn){const panel=btn.closest('.analysis-panel');if(!panel)return;const fields=panel.querySelectorAll('.analysis-field');let text='';fields.forEach(f=>{const label=f.querySelector('strong');const items=f.querySelectorAll('li');const p=f.querySelector('.analysis-copyable span')||f.querySelector('p');if(label)text+=label.textContent+':\n';if(p)text+=p.textContent+'\n';if(items.length){items.forEach(li=>{text+='- '+li.textContent+'\n'})}text+='\n'});navigator.clipboard.writeText(text.trim()).then(()=>{btn.textContent='Copied!';setTimeout(()=>{btn.textContent='Copy All'},1500)})}

/* ---- progress indicator ---- */
let progressTimers=[];
function startProgress(){
    const steps=[
        {delay:0,text:'\uD83D\uDD0D Analyzing repository\u2026'},
        {delay:8000,text:'\uD83D\uDD0D Still analyzing\u2026'},
        {delay:15000,text:'\u270D\uFE0F Generating promotion\u2026'},
        {delay:25000,text:'\u23F3 Almost there\u2026'},
    ];
    steps.forEach(step=>{
        const t=setTimeout(()=>{genStatus.textContent=step.text},step.delay);
        progressTimers.push(t);
    });
}
function stopProgress(){
    progressTimers.forEach(clearTimeout);
    progressTimers=[];
    genStatus.textContent='';
}

/* ---- GENERATE ---- */
const genBtn=document.getElementById('gen-btn');
const genStatus=document.getElementById('gen-status');
const genInfo=document.getElementById('gen-info');
const genError=document.getElementById('gen-error');
const genResult=document.getElementById('gen-result');

genBtn.onclick=async()=>{
    startProgress();genInfo.textContent='';genError.textContent='';genResult.classList.add('hidden');genResult.innerHTML='';genBtn.disabled=true;
    try{
        const body={target_channel:document.getElementById('channel').value,target_audience:document.getElementById('audience').value.trim()};
        const url=document.getElementById('repo-url').value.trim();
        if(url)body.repo_url=url;
        const res=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
        if(res.status===429){const e=await res.json().catch(()=>({}));const secs=e.retry_after_seconds||60;throw new Error('Rate limit reached. Please wait '+secs+' seconds before trying again.')}
        if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error||res.statusText)}
        const d=await res.json();
        genResult.innerHTML=renderFull(d);
        genResult.classList.remove('hidden');
        if(!url)genInfo.textContent='\u2139\uFE0F Using sample repo (no URL provided)';
    }catch(e){genError.textContent='Error: '+e.message}
    finally{stopProgress();genBtn.disabled=false}
};

function renderFull(d){
    let h='<div class="card"><h3>'+esc(d.headline)+'</h3><p>'+esc(d.summary)+'</p>';
    if(d.key_benefits&&d.key_benefits.length){h+='<strong>Key Benefits</strong><ul class="benefits">';d.key_benefits.forEach(b=>{h+='<li>'+esc(b)+'</li>'});h+='</ul>'}
    if(d.twitter_posts&&d.twitter_posts.length){h+='<strong>Twitter Posts</strong>';d.twitter_posts.forEach(t=>{h+='<div class="tweet"><span>'+esc(t)+'</span>'+tweetCopyBtn()+'</div>'})}
    if(d.linkedin_post){h+='<strong>LinkedIn Post</strong><div class="linkedin-block">'+esc(d.linkedin_post)+'</div>'+liCopyBtn()}
    if(d.call_to_action){h+='<div class="cta">'+esc(d.call_to_action)+'</div>'}
    if(d.tags&&d.tags.length){h+='<div class="pills">';d.tags.forEach(t=>{h+='<span class="pill">'+esc(t)+'</span>'});h+='</div>'}
    h+=renderRepoStats(d);
    h+=renderTraffic(d);
    h+=renderAnalysis(d.analysis);
    if(d.id){h+='<div class="meta">ID: '+d.id+' · Saved: '+esc(d.created_at||'')+'</div>'}
    h+='<br><button class="toggle" onclick="toggleRaw()">Show raw JSON</button><pre class="hidden" id="raw-json">'+esc(JSON.stringify(d,null,2))+'</pre>';
    h+='</div>';
    return h;
}

function renderRepoStats(d){
    if(!d.stars && !d.forks && !d.watchers) return '';
    return '<div class="traffic-block">'
        +'<strong>⭐ Repository Stats</strong>'
        +'<span class="metric">⭐ Stars: '+(d.stars||0)+'</span>'
        +'<span class="metric">🍴 Forks: '+(d.forks||0)+'</span>'
        +'<span class="metric">👀 Watchers: '+(d.watchers||0)+'</span>'
        +'</div>';
}

function renderTraffic(d){
    if(!d.views_14d_total && !d.views_14d_unique && !d.clones_14d_total && !d.clones_14d_unique) return '';
    return '<div class="traffic-block">'
        +'<strong>📊 Traffic (last 14 days)</strong>'
        +'<span class="metric">👁 Views: '+(d.views_14d_total||0)+' total / '+(d.views_14d_unique||0)+' unique</span>'
        +'<span class="metric">📦 Clones: '+(d.clones_14d_total||0)+' total / '+(d.clones_14d_unique||0)+' unique</span>'
        +'</div>';
}

function renderAnalysis(analysis){
    if(!analysis)return '';
    let h='<div class="analysis-panel">';
    h+='<h4>🔍 Why This Repo?</h4>';
    h+='<div class="analysis-label">AI-generated analysis</div>';
    if(analysis.primary_value_proposition){
        h+='<div class="analysis-field"><strong title="The core problem this repo solves, in one sentence">Value Proposition</strong>'
          +'<div class="analysis-copyable"><span>'+esc(analysis.primary_value_proposition)+'</span>'
          +'<button class="btn-sm" aria-label="Copy value proposition" onclick="event.stopPropagation();copyText(this.previousElementSibling.textContent,this)">Copy</button>'
          +'</div></div>';
    }
    if(analysis.ideal_audience&&analysis.ideal_audience.length){
        h+='<div class="analysis-field"><strong title="Who would benefit most from using this repo">Ideal Audience</strong><ul>';analysis.ideal_audience.forEach(a=>{h+='<li>'+esc(a)+'</li>'});h+='</ul></div>';
    }
    if(analysis.key_features&&analysis.key_features.length){
        h+='<div class="analysis-field"><strong title="Main capabilities framed as user benefits">Key Features</strong><ul>';analysis.key_features.forEach(f=>{h+='<li>'+esc(f)+'</li>'});h+='</ul></div>';
    }
    if(analysis.differentiators&&analysis.differentiators.length){
        h+='<div class="analysis-field"><strong title="What sets this repo apart from alternatives">Differentiators</strong><ul>';analysis.differentiators.forEach(x=>{h+='<li>'+esc(x)+'</li>'});h+='</ul></div>';
    }
    if(analysis.risk_or_limitations&&analysis.risk_or_limitations.length){
        h+='<div class="analysis-field"><strong title="Potential concerns or gaps to be aware of">Risks & Limitations</strong><ul>';analysis.risk_or_limitations.forEach(r=>{h+='<li>'+esc(r)+'</li>'});h+='</ul></div>';
    }
    if(analysis.social_proof_signals&&analysis.social_proof_signals.length){
        h+='<div class="analysis-field"><strong title="Traction signals based on stars, traffic, and community">Social Proof</strong><ul>';analysis.social_proof_signals.forEach(s=>{h+='<li>'+esc(s)+'</li>'});h+='</ul></div>';
    }
    if(analysis.recommended_positioning_angle&&analysis.recommended_positioning_angle.length){
        h+='<div class="analysis-field"><strong title="Suggested ways to pitch this repo to different audiences">Positioning Angles</strong><ul>';analysis.recommended_positioning_angle.forEach(a=>{h+='<li>'+esc(a)+'</li>'});h+='</ul></div>';
    }
    h+='<div style="text-align:right;margin-top:.5rem">'
      +'<button class="btn-sm" aria-label="Copy all analysis" onclick="event.stopPropagation();copyAnalysis(this)">Copy All</button>'
      +'</div>';
    h+='</div>';
    return h;
}

function toggleRaw(){const el=document.getElementById('raw-json');el.classList.toggle('hidden');const btn=el.previousElementSibling;btn.textContent=el.classList.contains('hidden')?'Show raw JSON':'Hide raw JSON'}

/* ---- SEARCH ---- */
const searchBtn=document.getElementById('search-btn');
const searchQ=document.getElementById('search-q');
const searchStatus=document.getElementById('search-status');
const searchError=document.getElementById('search-error');
const searchResults=document.getElementById('search-results');

let activeFilters = { tags: [], channel: '', minStars: 0 };
let currentSort = 'relevance';
let currentHighlights = {};

searchBtn.onclick=doSearch;
document.getElementById('sort-select').value=currentSort;
searchQ.onkeydown=e=>{if(e.key==='Enter'&&!suggestList.classList.contains('visible'))doSearch()};

/* ---- autocomplete / suggest ---- */
let suggestTimer=null;
let suggestIdx=-1;
const suggestList=document.getElementById('suggest-list');

searchQ.addEventListener('input',function(){
    clearTimeout(suggestTimer);
    const v=this.value.trim();
    if(v.length<2){hideSuggestions();return}
    suggestTimer=setTimeout(()=>fetchSuggestions(v),300);
});

searchQ.addEventListener('keydown',function(e){
    if(!suggestList.classList.contains('visible'))return;
    const items=suggestList.querySelectorAll('.autocomplete-item');
    if(e.key==='ArrowDown'){e.preventDefault();suggestIdx=Math.min(suggestIdx+1,items.length-1);highlightSuggest(items)}
    else if(e.key==='ArrowUp'){e.preventDefault();suggestIdx=Math.max(suggestIdx-1,-1);highlightSuggest(items)}
    else if(e.key==='Enter'&&suggestIdx>=0){e.preventDefault();selectSuggestion(items[suggestIdx].dataset.term)}
    else if(e.key==='Escape'){hideSuggestions()}
});

document.addEventListener('click',function(e){
    if(!e.target.closest('.autocomplete-wrap'))hideSuggestions();
});

async function fetchSuggestions(prefix){
    try{
        const res=await fetch('/api/suggest?q='+encodeURIComponent(prefix));
        if(!res.ok)return;
        const data=await res.json();
        if(!data||!data.length){hideSuggestions();return}
        suggestIdx=-1;
        suggestList.innerHTML=data.map((s,i)=>{
            const termEsc=esc(s.term);
            return '<div class="autocomplete-item" role="option" data-term="'+termEsc.replace(/"/g,'&quot;')+'" onclick="selectSuggestion(this.dataset.term)">'+termEsc+'<span class="ac-weight">⭐ '+s.weight+'</span></div>';
        }).join('');
        suggestList.classList.add('visible');
    }catch(e){hideSuggestions()}
}

function highlightSuggest(items){
    items.forEach((el,i)=>{el.classList.toggle('active',i===suggestIdx)});
    if(suggestIdx>=0&&items[suggestIdx])items[suggestIdx].scrollIntoView({block:'nearest'});
}

function selectSuggestion(term){
    searchQ.value=term;
    hideSuggestions();
    doSearch();
}

function hideSuggestions(){
    suggestList.classList.remove('visible');
    suggestList.innerHTML='';
    suggestIdx=-1;
}

async function doSearch(){
    const q=searchQ.value.trim();
    searchStatus.textContent='Searching…';searchError.textContent='';searchResults.innerHTML='';searchBtn.disabled=true;
    document.getElementById('search-collation').innerHTML='';
    try{
        const params=new URLSearchParams();
        if(q)params.set('q',q);
        activeFilters.tags.forEach(t=>params.append('tag',t));
        if(activeFilters.channel)params.set('channel',activeFilters.channel);
        if(activeFilters.minStars>0)params.set('min_stars',String(activeFilters.minStars));
        if(currentSort&&currentSort!=='relevance')params.set('sort',currentSort);
        const url='/api/search'+(params.toString()?'?'+params.toString():'');
        const res=await fetch(url);
        if(res.status===429){const e=await res.json().catch(()=>({}));const secs=e.retry_after_seconds||60;throw new Error('Search rate limit reached. Please wait '+secs+' seconds.')}
        if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error||res.statusText)}
        const d=await res.json();
        currentHighlights=d.highlights||{};
        if(d.collation){
            document.getElementById('search-collation').innerHTML='<div class="did-you-mean">Did you mean: <a onclick="searchQ.value=\''+esc(d.collation).replace(/'/g,"\\'")+'\';doSearch()">'+esc(d.collation)+'</a>?</div>';
        } else {
            document.getElementById('search-collation').innerHTML='';
        }
        renderActiveFilters();
        renderFacets(d.facets);
        if(!d.results||d.results.length===0){searchResults.innerHTML='<p style="color:#888">No results found.</p>';return}
        const groups=groupByRepo(d.results);
        searchResults.innerHTML=groups.map(renderGroup).join('');
    }catch(e){searchError.textContent='Error: '+e.message}
    finally{searchStatus.textContent='';searchBtn.disabled=false;loadPopular()}
}

function renderFacets(facets){
    const el=document.getElementById('search-facets');
    if(!facets||(!facets.tags&&!facets.target_channel)){el.innerHTML='';return}
    let h='';
    if(facets.tags&&facets.tags.length){
        h+='<div class="facet-group"><strong>Tags:</strong>';
        facets.tags.forEach(f=>{
            const isActive=activeFilters.tags.includes(f.value);
            h+='<span class="facet-chip'+(isActive?' active':'')+'" onclick="toggleTagFilter(\''+esc(f.value).replace(/'/g,"\\'")+'\')">'+esc(f.value)+' ('+f.count+')</span>';
        });
        h+='</div>';
    }
    if(facets.target_channel&&facets.target_channel.length){
        h+='<div class="facet-group"><strong>Channel:</strong>';
        facets.target_channel.forEach(f=>{
            const isActive=activeFilters.channel===f.value;
            h+='<span class="facet-chip'+(isActive?' active':'')+'" onclick="toggleChannelFilter(\''+esc(f.value).replace(/'/g,"\\'")+'\')">'+esc(f.value)+' ('+f.count+')</span>';
        });
        h+='</div>';
    }
    el.innerHTML=h;
}

function renderActiveFilters(){
    const el=document.getElementById('active-filters');
    let h='';
    activeFilters.tags.forEach(t=>{
        h+='<span class="filter-chip">tag: '+esc(t)+' <button onclick="removeTagFilter(\''+esc(t).replace(/'/g,"\\'")+'\')">×</button></span>';
    });
    if(activeFilters.channel){
        h+='<span class="filter-chip">channel: '+esc(activeFilters.channel)+' <button onclick="removeChannelFilter()">×</button></span>';
    }
    if(activeFilters.minStars>0){
        h+='<span class="filter-chip">stars ≥ '+activeFilters.minStars+' <button onclick="removeStarsFilter()">×</button></span>';
    }
    if(h){
        h+='<span class="filter-chip" style="background:#fee2e2;color:#991b1b;border-color:#fca5a5;cursor:pointer" onclick="clearAllFilters()">Clear all ×</span>';
    }
    el.innerHTML=h;
}

function toggleTagFilter(tag){
    const idx=activeFilters.tags.indexOf(tag);
    if(idx>=0)activeFilters.tags.splice(idx,1);
    else activeFilters.tags.push(tag);
    doSearch();
}
function toggleChannelFilter(ch){
    activeFilters.channel=activeFilters.channel===ch?'':ch;
    doSearch();
}
function removeTagFilter(tag){
    activeFilters.tags=activeFilters.tags.filter(t=>t!==tag);
    doSearch();
}
function removeChannelFilter(){
    activeFilters.channel='';
    doSearch();
}
function removeStarsFilter(){
    activeFilters.minStars=0;
    doSearch();
}
function clearAllFilters(){
    activeFilters={tags:[],channel:'',minStars:0};
    doSearch();
}

function safeHighlight(html){
    return html
        .replace(/<mark>/g, '\x00MARK_OPEN\x00')
        .replace(/<\/mark>/g, '\x00MARK_CLOSE\x00')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\x00MARK_OPEN\x00/g, '<mark>')
        .replace(/\x00MARK_CLOSE\x00/g, '</mark>');
}
function hlField(repoUrl, field, plainValue){
    const docHl = currentHighlights[repoUrl];
    if(docHl && docHl[field]){
        return safeHighlight(docHl[field]);
    }
    return esc(plainValue);
}

function groupByRepo(results){
    const map=new Map();
    results.forEach(p=>{
        const key=p.repo_url;
        if(!map.has(key))map.set(key,[]);
        map.get(key).push(p);
    });
    return Array.from(map.values());
}

function channelIcon(ch){
    if(ch==='twitter')return '🐦';
    if(ch==='linkedin')return '💼';
    return '📢';
}

function renderGroup(group){
    const p=group[0];
    const firstTweet=p.twitter_posts&&p.twitter_posts.length?p.twitter_posts[0]:'';
    const tags=(p.tags||[]).map(t=>'<span class="pill">'+esc(t)+'</span>').join('');
    const date=fmtDate(p.created_at);
    const groupCount=group.length>1?'<span class="group-count">'+group.length+' channels</span>':'';
    return '<div class="card compact-card" onclick="this.querySelector(\'.expand\').classList.toggle(\'hidden\')">'
        +'<h3><a href="'+safeHref(p.repo_url)+'" target="_blank" rel="noopener" onclick="event.stopPropagation()">'+esc(p.repo_name)+'</a>'+groupCount+'</h3>'
        +'<div class="meta" style="user-select:all;cursor:text" onclick="event.stopPropagation()">'+esc(p.repo_url)+'</div>'
        +'<p>'+hlField(p.repo_url,'headline',p.headline)+'</p>'
        +renderAnalysisCompact(p.analysis)
        +(firstTweet?'<p class="meta" style="color:#333">\uD83D\uDC26 '+esc(firstTweet)+'</p>':'')
        +'<div class="pills">'+tags+'</div>'
        +renderStatsCompact(p)
        +renderTrafficCompact(p)
        +'<div class="meta">'+esc(date)+'</div>'
        +'<div class="expand hidden" style="margin-top:.75rem" onclick="event.stopPropagation()">'
        +renderGroupedExpanded(group)
        +'</div>'
        +'</div>';
}

function renderGroupedExpanded(group){
    if(group.length===1)return renderExpandedBody(group[0]);

    const uid='grp-'+Math.random().toString(36).slice(2,8);
    let tabs='<div class="channel-tabs">';
    group.forEach((p,i)=>{
        tabs+='<button class="channel-tab'+(i===0?' active':'')+'" onclick="event.stopPropagation();switchChannelTab(\''+uid+'\','+i+',this)">'
            +'<span class="ch-icon">'+channelIcon(p.target_channel)+'</span>'
            +esc(p.target_channel||'general')
            +'</button>';
    });
    tabs+='</div>';

    let panels='';
    group.forEach((p,i)=>{
        panels+='<div class="channel-panel-'+uid+'" style="'+(i>0?'display:none':'')+'">' 
            +renderExpandedBody(p)
            +'</div>';
    });

    return tabs+panels;
}

function switchChannelTab(uid, idx, btn){
    btn.closest('.channel-tabs').querySelectorAll('.channel-tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
    const panels=btn.closest('.expand').querySelectorAll('.channel-panel-'+uid);
    panels.forEach((p,i)=>p.style.display=i===idx?'':'none');
}

async function findSimilar(btn, repoUrl){
    const container=btn.nextElementSibling;
    if(container.innerHTML){container.innerHTML='';btn.textContent='\uD83D\uDD0D Find Similar';return}
    btn.textContent='Loading\u2026';btn.disabled=true;
    try{
        const res=await fetch('/api/mlt?id='+encodeURIComponent(repoUrl)+'&limit=5');
        if(!res.ok)throw new Error('MLT request failed');
        const d=await res.json();
        if(!d.results||d.results.length===0){
            container.innerHTML='<div class="mlt-results"><p style="color:#888;font-size:.85rem">No similar promotions found.</p></div>';
        }else{
            let h='<div class="mlt-results"><h4>Similar Promotions</h4>';
            d.results.forEach(p=>{
                const tags=(p.tags||[]).slice(0,3).map(t=>'<span class="pill">'+esc(t)+'</span>').join('');
                h+='<div class="mlt-card">'
                    +'<a href="'+safeHref(p.repo_url)+'" target="_blank" rel="noopener">'+esc(p.repo_name)+'</a>'
                    +' <span class="mlt-meta">'+esc(p.target_channel||'general')+'</span>'
                    +'<p style="margin:.2rem 0;font-size:.85rem">'+esc(p.headline)+'</p>'
                    +'<div class="pills" style="margin-top:.2rem">'+tags+'</div>'
                    +'</div>';
            });
            h+='</div>';
            container.innerHTML=h;
        }
        btn.textContent='\uD83D\uDD0D Hide Similar';
    }catch(e){
        container.innerHTML='<p style="color:#c00;font-size:.85rem">Failed to load similar results.</p>';
        btn.textContent='\uD83D\uDD0D Find Similar';
    }finally{btn.disabled=false}
}

function renderCompact(p){
    const firstTweet=p.twitter_posts&&p.twitter_posts.length?p.twitter_posts[0]:'';
    const tags=(p.tags||[]).map(t=>'<span class="pill">'+esc(t)+'</span>').join('');
    const date=fmtDate(p.created_at);
    return '<div class="card compact-card" onclick="this.querySelector(\'.expand\').classList.toggle(\'hidden\')">'
        +'<h3><a href="'+safeHref(p.repo_url)+'" target="_blank" rel="noopener" onclick="event.stopPropagation()">'+esc(p.repo_name)+'</a></h3>'
        +'<div class="meta" style="user-select:all;cursor:text" onclick="event.stopPropagation()">'+esc(p.repo_url)+'</div>'
        +'<p>'+hlField(p.repo_url,'headline',p.headline)+'</p>'
        +renderAnalysisCompact(p.analysis)
        +(firstTweet?'<p class="meta" style="color:#333">\uD83D\uDC26 '+esc(firstTweet)+'</p>':'')
        +'<div class="pills">'+tags+'</div>'
        +renderStatsCompact(p)
        +renderTrafficCompact(p)
        +'<div class="meta">'+esc(date)+'</div>'
        +'<div class="expand hidden" style="margin-top:.75rem">'+renderExpandedBody(p)+'</div>'
        +'</div>';
}

function renderExpandedBody(d){
    let h='<p>'+hlField(d.repo_url,'summary',d.summary)+'</p>';
    if(d.key_benefits&&d.key_benefits.length){h+='<strong>Key Benefits</strong><ul class="benefits">';d.key_benefits.forEach(b=>{h+='<li>'+esc(b)+'</li>'});h+='</ul>'}
    if(d.twitter_posts&&d.twitter_posts.length){h+='<strong>Twitter Posts</strong>';d.twitter_posts.forEach(t=>{h+='<div class="tweet"><span>'+esc(t)+'</span>'+tweetCopyBtn()+'</div>'})}
    if(d.linkedin_post){h+='<strong>LinkedIn Post</strong><div class="linkedin-block">'+esc(d.linkedin_post)+'</div>'+liCopyBtn()}
    if(d.call_to_action){h+='<div class="cta">'+esc(d.call_to_action)+'</div>'}
    h+=renderRepoStats(d);
    h+=renderTraffic(d);
    h+=renderAnalysis(d.analysis);
    h+='<button class="mlt-btn" onclick="event.stopPropagation();findSimilar(this,\''+esc(d.repo_url).replace(/'/g,"\\'")+'\')">\uD83D\uDD0D Find Similar</button>';
    h+='<div class="mlt-container"></div>';
    return h;
}

function renderAnalysisCompact(analysis){
    if(!analysis||!analysis.primary_value_proposition)return '';
    return '<p class="analysis-snippet">💡 '+esc(analysis.primary_value_proposition)+'</p>';
}

function renderStatsCompact(d){
    if(!d.stars && !d.forks && !d.watchers) return '';
    return '<div class="meta" style="color:#0969da">⭐ '+(d.stars||0)+' \u00b7 🍴 '+(d.forks||0)+' \u00b7 👀 '+(d.watchers||0)+'</div>';
}

function renderTrafficCompact(d){
    if(!d.views_14d_total && !d.views_14d_unique && !d.clones_14d_total && !d.clones_14d_unique) return '';
    return '<div class="meta" style="color:#0969da">📊 Views: '+(d.views_14d_total||0)+' \u00b7 Clones: '+(d.clones_14d_total||0)+'</div>';
}

/* load recent on page load */
doSearch();

async function loadPopular(){
    try{
        const res=await fetch('/api/analytics/popular?limit=8');
        if(!res.ok)return;
        const data=await res.json();
        if(!data||!data.length){document.getElementById('popular-searches').innerHTML='';return}
        let h='<div class="popular-section"><h4>\uD83D\uDD25 Popular Searches</h4>';
        data.forEach(p=>{
            h+='<span class="popular-chip" onclick="searchQ.value=\''+esc(p.query).replace(/'/g,"\\'")+'\';doSearch()">'+esc(p.query)+'<span class="pop-count">'+p.count+'</span></span>';
        });
        h+='</div>';
        document.getElementById('popular-searches').innerHTML=h;
    }catch(e){}
}
loadPopular();
</script>
