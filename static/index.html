<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repo Promoter Agent</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        h1 { margin-bottom: 0.25rem; }
        .desc { color: #666; margin-top: 0; }
        button { padding: 0.6rem 1.2rem; font-size: 1rem; cursor: pointer; border: 1px solid #333; border-radius: 4px; background: #1a1a1a; color: #fff; }
        button:hover { background: #333; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #status { margin: 1rem 0; color: #555; font-style: italic; }
        #error { color: #c00; margin: 1rem 0; white-space: pre-wrap; }
        #output-section { display: none; margin-top: 1rem; }
        .output-header { display: flex; align-items: center; gap: 0.5rem; }
        .output-header button { font-size: 0.8rem; padding: 0.3rem 0.6rem; }
        pre { background: #f4f4f4; padding: 1rem; border-radius: 4px; overflow-x: auto; font-family: monospace; font-size: 0.85rem; white-space: pre-wrap; word-wrap: break-word; }
    </style>
</head>
<body>
    <h1>Repo Promoter Agent</h1>
    <p class="desc">Generate promotional content for a GitHub repo using a Gradient AI agent.</p>
    <button id="btn">Generate promo for sample repo</button>
    <div id="status"></div>
    <div id="error"></div>
    <div id="output-section">
        <div class="output-header">
            <h3>Result</h3>
            <button id="copy-btn">Copy JSON</button>
        </div>
        <pre id="output"></pre>
    </div>
    <script>
        const btn = document.getElementById('btn');
        const status = document.getElementById('status');
        const error = document.getElementById('error');
        const outputSection = document.getElementById('output-section');
        const output = document.getElementById('output');
        const copyBtn = document.getElementById('copy-btn');
        let rawJSON = '';

        btn.onclick = async () => {
            status.textContent = 'Generating\u2026';
            error.textContent = '';
            outputSection.style.display = 'none';
            output.textContent = '';
            btn.disabled = true;
            try {
                const res = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ repo_url: 'https://github.com/AcaciaMan/village-square' })
                });
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.error || res.statusText);
                }
                const data = await res.json();
                rawJSON = JSON.stringify(data, null, 2);
                output.textContent = rawJSON;
                outputSection.style.display = 'block';
            } catch (e) {
                error.textContent = 'Error: ' + e.message;
            } finally {
                status.textContent = '';
                btn.disabled = false;
            }
        };

        copyBtn.onclick = () => {
            navigator.clipboard.writeText(rawJSON).then(() => {
                copyBtn.textContent = 'Copied!';
                setTimeout(() => { copyBtn.textContent = 'Copy JSON'; }, 1500);
            });
        };
    </script>
</body>
</html>
